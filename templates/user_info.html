{% extends "base.html" %}
{% block content %}
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card" style="width: 400px;">
            <div class="card-header d-flex justify-content-start">
                <span id="in_number" class="card-title">
                    1
                </span>
                <span class="card-title">
                    / 8
                </span>
            </div>
            <div class="card-body">
                <form id="multiStepForm">
                    <!-- Step 1 -->
                    <div class="form-step" data-step="1">
                        <label for="name" class="card-title">
                            <h1 class="card-title">이름을 입력해주세요😊</h1>
                        </label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="이름" required>
                    </div>
                    <!-- Step 2 -->
                    <div class="form-step d-none" data-step="2">
                        <label for="email" class="card-title">
                            <h1 class="card-title">이메일을 입력해주세요📧</h1>
                        </label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="이메일" required>
                    </div>
                    <!-- Step 3 -->
                    <div class="form-step d-none" data-step="3">
                        <label for="phone" class="card-title">
                            <h1 class="card-title">전화번호를 입력해주세요📞</h1>
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="전화번호" required>
                    </div>
                    <!-- 추가적인 단계들을 여기에 추가 -->
                    <!-- 예를 들어, step 4 ~ step 8 -->
                </form>
            </div>
            <div class="card-footer d-flex justify-content-center">
                <button type="button" class="btn btn-secondary" id="nextBtn" disabled>다음</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('multiStepForm');
            const nextBtn = document.getElementById('nextBtn');
            const inNumber = document.getElementById('in_number');
            const totalSteps = 8;
            let currentStep = 1;

            // 입력 필드 변경 시 버튼 활성화/비활성화
            form.addEventListener('input', function() {
                const currentInput = form.querySelector(`.form-step[data-step="${currentStep}"] input`);
                if (currentInput.value.trim() !== "") {
                    nextBtn.disabled = false;
                } else {
                    nextBtn.disabled = true;
                }
            });

            nextBtn.addEventListener('click', function() {
                const currentInput = form.querySelector(`.form-step[data-step="${currentStep}"] input`);
                if (currentInput.value.trim() === "") {
                    alert("필드를 비워둘 수 없습니다.");
                    return;
                }

                // 현재 입력값을 저장하거나 처리하는 로직을 여기에 추가
                // 예: form 데이터를 서버로 전송하거나 로컬 스토리지에 저장

                // 다음 단계로 이동
                form.querySelector(`.form-step[data-step="${currentStep}"]`).classList.add('d-none');
                currentStep += 1;

                if (currentStep > totalSteps) {
                    // 모든 단계를 완료했을 때
                    alert("모든 단계를 완료했습니다!");
                    // 완료 후의 동작을 여기에 추가 (예: 리다이렉트)
                    return;
                }

                // 다음 단계 표시
                form.querySelector(`.form-step[data-step="${currentStep}"]`).classList.remove('d-none');

                // in_number 업데이트
                inNumber.textContent = currentStep;

                // 버튼 텍스트 변경
                if (currentStep === totalSteps) {
                    nextBtn.textContent = "완료";
                } else {
                    nextBtn.textContent = "다음";
                }

                // 버튼 비활성화 상태로 초기화
                nextBtn.disabled = true;
            });

            const initialInput = form.querySelector(`.form-step[data-step="${currentStep}"] input`);
            if (initialInput.value.trim() !== "") {
                nextBtn.disabled = false;
            }
        });
    </script>
{% endblock %}
